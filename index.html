<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민하 ♥ 준범 100일</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBF3EA;
    --paper-deep:#F3E7D8;
    --ink:#2B2440;
    --ink-soft:#5B5270;
    --seal:#B33951;
    --seal-deep:#8C2A3E;
    --blush:#F0D9DE;
    --gold:#B8923D;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;
    min-height:100svh;
    overflow-x:hidden;
    position:relative;
  }

  .petal{
    position:fixed;
    top:-40px;
    width:14px;height:14px;
    background:var(--blush);
    border-radius:0% 100% 0% 100%;
    opacity:0.7;
    pointer-events:none;
    animation:fall linear infinite;
    z-index:0;
  }
  @keyframes fall{
    0%{transform:translateY(0) translateX(0) rotate(0deg);}
    100%{transform:translateY(110vh) translateX(40px) rotate(300deg);}
  }
  @media (prefers-reduced-motion: reduce){
    .petal{animation:none; display:none;}
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .stage{
    position:relative;
    z-index:1;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
  }
  .hidden{display:none !important;}

  .envelope{
    width:min(430px, 92vw);
    background:linear-gradient(180deg, #ffffff, var(--paper-deep));
    border-radius:6px;
    padding:56px 34px 40px;
    text-align:center;
    box-shadow:0 20px 50px -20px rgba(43,36,64,0.35), 0 2px 0 rgba(184,146,61,0.25) inset;
    position:relative;
    border:1px solid #e8d9c4;
    transition:transform .5s cubic-bezier(.4,0,.2,1), opacity .5s ease;
  }
  .envelope::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:120px;
    background:var(--blush);
    clip-path:polygon(0 0, 100% 0, 50% 68%);
    border-radius:6px 6px 0 0;
    opacity:0.55;
  }
  .seal{
    width:64px;height:64px;
    margin:0 auto 22px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--seal), var(--seal-deep));
    display:flex;align-items:center;justify-content:center;
    color:var(--blush);
    font-family:'Gowun Batang',serif;
    font-size:22px;
    box-shadow:0 6px 14px -4px rgba(140,42,62,0.6), inset 0 -3px 6px rgba(0,0,0,0.25);
    position:relative;
    z-index:2;
    transition:transform .5s ease, opacity .5s ease;
  }
  .eyebrow{
    font-family:'Gaegu',cursive;
    font-size:18px;
    color:var(--ink-soft);
    margin:0 0 6px;
    position:relative; z-index:2;
  }
  .question{
    font-family:'Gowun Batang',serif;
    font-size:26px;
    line-height:1.5;
    margin:0 0 34px;
    position:relative; z-index:2;
  }
  .btn-row{
    display:flex;
    gap:14px;
    justify-content:center;
    position:relative; z-index:2;
  }
  button{
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;
    font-weight:500;
    border-radius:999px;
    padding:12px 30px;
    cursor:pointer;
    border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    transition:all .25s ease;
  }
  button:hover{ transform:translateY(-2px); }
  button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  .btn-yes{
    background:var(--seal);
    border-color:var(--seal);
    color:#fff;
  }
  .btn-yes:hover{ background:var(--seal-deep); }

  .envelope.opening{
    transform:scale(0.92);
    opacity:0;
  }
  .envelope.opening .seal{
    transform:scale(0.2) rotate(25deg);
    opacity:0;
  }
  .envelope.shake{ animation:shake .5s ease; }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px) rotate(-1deg);}
    40%{transform:translateX(8px) rotate(1deg);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }

  .exit-box{ text-align:center; max-width:360px; }
  .door-wrap{ perspective:600px; margin:0 auto 24px; width:120px; }
  .door{
    width:120px; height:170px;
    background:linear-gradient(180deg,#3d3350,var(--ink));
    border-radius:4px 4px 0 0;
    margin:0 auto;
    position:relative;
    transform-origin:left center;
    transition:transform .8s cubic-bezier(.6,0,.4,1);
    box-shadow:0 10px 24px -8px rgba(0,0,0,0.4);
  }
  .door::after{
    content:"";
    position:absolute;
    right:14px; top:50%;
    width:8px;height:8px;
    background:var(--gold);
    border-radius:50%;
    transform:translateY(-50%);
  }
  .door.closing{ transform:rotateY(-75deg); }
  .exit-title{
    font-family:'Gowun Batang',serif;
    font-size:24px;
    margin:0 0 10px;
  }
  .exit-sub{
    font-family:'Gaegu',cursive;
    font-size:16px;
    color:var(--ink-soft);
    margin:0 0 26px;
  }
  .link-btn{
    border:none;
    background:none;
    color:var(--ink-soft);
    text-decoration:underline;
    font-size:14px;
    padding:6px;
  }

  .reveal{
    max-width:640px;
    width:100%;
    margin:0 auto;
    padding:60px 20px 80px;
    text-align:center;
    opacity:0;
    transform:translateY(18px);
    animation:reveal-in .7s ease forwards;
  }
  @keyframes reveal-in{
    to{opacity:1; transform:translateY(0);}
  }
  .day-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--blush);
    color:var(--seal-deep);
    font-family:'Gaegu',cursive;
    font-size:15px;
    padding:6px 16px;
    border-radius:999px;
    margin-bottom:18px;
  }
  .headline{
    font-family:'Gowun Batang',serif;
    font-size:clamp(34px,7vw,52px);
    line-height:1.25;
    margin:0 0 10px;
  }
  .headline span{ color:var(--seal); }
  .subhead{
    font-family:'Gaegu',cursive;
    font-size:18px;
    color:var(--ink-soft);
    margin:0 0 46px;
  }

  .slider{
    position:relative;
    margin:0 auto 18px;
    width:min(400px,88vw);
  }
  .frame{
    display:none;
    background:#fff;
    border-radius:4px;
    padding:14px 14px 26px;
    box-shadow:0 16px 40px -18px rgba(43,36,64,0.4);
    border:1px solid #e8d9c4;
  }
  .frame.active{ display:block; }
  .photo-slot{
    width:100%;
    aspect-ratio:4/5;
    border-radius:2px;
    overflow:hidden;
    background:var(--paper-deep);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    gap:8px;
    border:1.5px dashed #d8c4a4;
  }
  .photo-slot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .caption{
    font-family:'Gaegu',cursive;
    font-size:16px;
    margin:14px 4px 0;
    color:var(--ink-soft);
  }
  .slider-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin-top:16px;
  }
  .arrow{
    border:none;
    background:var(--ink);
    color:#fff;
    width:38px;height:38px;
    border-radius:50%;
    padding:0;
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .dots{ display:flex; gap:7px; }
  .dot{
    width:7px;height:7px;
    border-radius:50%;
    background:#d8c4a4;
    padding:0; border:none;
  }
  .dot.active{ background:var(--seal); }

  .note-card{
    margin-top:56px;
    padding:28px 24px;
    background:#fff;
    border-radius:4px;
    border:1px solid #e8d9c4;
    text-align:left;
  }
  .note-text{
    font-family:'Gaegu',cursive;
    font-size:19px;
    line-height:1.8;
    color:var(--ink);
    margin:0 0 14px;
    white-space:pre-line;
  }
  .note-sign{
    font-family:'Gaegu',cursive;
    font-size:17px;
    color:var(--ink-soft);
    text-align:right;
    margin:0;
  }
</style>
</head>
<body>

<div id="petals"></div>

<!-- 1. 확인 화면 -->
<section class="stage" id="stage-gate">
  <div class="envelope" id="envelope">
    <div class="seal" id="seal">♥</div>
    <p class="eyebrow" id="eyebrow">To.</p>
    <p class="question" id="question">민하님이 맞으신가요?</p>
    <div class="btn-row">
      <button class="btn-yes" id="btn-yes">예</button>
      <button id="btn-no">아니요</button>
    </div>
  </div>
</section>

<!-- 2. 거절 화면 -->
<section class="stage hidden" id="stage-exit">
  <div class="exit-box">
    <div class="door-wrap"><div class="door" id="door"></div></div>
    <p class="exit-title">나가주세요</p>
    <p class="exit-sub">이 편지는 민하만 열어볼 수 있슈!!! </p>
    <button class="link-btn" id="btn-retry">다시 확인할게요</button>
  </div>
</section>

<!-- 3. 본문 -->
<section class="stage hidden" id="stage-reveal">
  <div class="reveal">
    <div class="day-badge" id="day-badge">D+100</div>
    <h1 class="headline">우리가 함께한<br><span id="headline-num">100</span>일</h1>
    <p class="subhead">그동안의 순간들 요약해봤어!!!</p>

    <div class="slider" id="slider"></div>
    <div class="slider-controls">
      <button class="arrow" id="prev" aria-label="이전 사진">‹</button>
      <div class="dots" id="dots"></div>
      <button class="arrow" id="next" aria-label="다음 사진">›</button>
    </div>

    <div class="note-card">
      <p class="note-text" id="love-note"></p>
      <p class="note-sign" id="signature"></p>
    </div>
  </div>
</section>

<script>
const CONFIG = {
  herName: "사랑스러운 민하",
  startDate: "2026-04-08",
  signature: "미나 더쿠 준범",
  loveNote:
`민하야, 벌써 우리가 만난 지 100일이 지났네 시간 진짜 빠르다!!!
덕분에 매일이 행복하고 새롭고 고마워♥
앞으로도 지금보다 더 잘해주고 사랑할게!
사랑해 ♥`,
  photos: [
    { src: "KakaoTalk_20260717_213048365.jpg", caption: "처음 합정에서 만나 같이 벚꽃보러 갔던 날" },
    { src: "KakaoTalk_20260717_213048365_01.jpg", caption: "처음 같이 인생네컷 찍었던 날!" },
    { src: "KakaoTalk_20260717_213048365_03.jpg", caption: "처음 해외여행으로 일본갔던 날" },
    { src: "KakaoTalk_20260717_213048365_02.jpg", caption: "영화관 컨셉의 인생네컷 짱..." },
    { src: "KakaoTalk_20260717_213048586.jpg", caption: "앞으로도 우리 행복하자 많이 사랑해♥" }
  ]
};

document.getElementById("question").textContent = `${CONFIG.herName}님이 맞으신가요?`;
document.getElementById("eyebrow").textContent = `To. ${CONFIG.herName}`;
document.getElementById("love-note").textContent = CONFIG.loveNote;
document.getElementById("signature").textContent = `- ${CONFIG.signature}`;

const start = new Date(CONFIG.startDate + "T00:00:00");
const today = new Date();

// 현재 날짜의 시, 분, 초, 밀리초를 모두 0으로 초기화 (오늘 날짜의 00:00:00로 맞춤)
today.setHours(0, 0, 0, 0); 

const dayCount = Math.floor((today - start) / 86400000) + 1;
document.getElementById("day-badge").textContent = `D+${dayCount}`;
document.getElementById("headline-num").textContent = dayCount;
const petalWrap = document.getElementById("petals");
for (let i = 0; i < 14; i++) {
  const p = document.createElement("div");
  p.className = "petal";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = 8 + Math.random() * 8 + "s";
  p.style.animationDelay = Math.random() * 10 + "s";
  p.style.opacity = 0.4 + Math.random() * 0.4;
  petalWrap.appendChild(p);
}

const sliderEl = document.getElementById("slider");
const dotsEl = document.getElementById("dots");
let current = 0;

CONFIG.photos.forEach((photo, i) => {
  const frame = document.createElement("div");
  frame.className = "frame" + (i === 0 ? " active" : "");

  const slot = document.createElement("div");
  slot.className = "photo-slot";
  if (photo.src) {
    const img = document.createElement("img");
    img.src = photo.src;
    img.alt = photo.caption || "";
    slot.appendChild(img);
  } else {
    slot.innerHTML = `<span style="font-size:28px;">🖼️</span><span style="font-family:'Noto Sans KR'; font-size:13px;">사진을 넣어주세요</span>`;
  }
  frame.appendChild(slot);

  const cap = document.createElement("p");
  cap.className = "caption";
  cap.textContent = photo.caption || "";
  frame.appendChild(cap);

  sliderEl.appendChild(frame);

  const dot = document.createElement("button");
  dot.className = "dot" + (i === 0 ? " active" : "");
  dot.addEventListener("click", () => showFrame(i));
  dotsEl.appendChild(dot);
});

function showFrame(idx) {
  const frames = sliderEl.querySelectorAll(".frame");
  const dots = dotsEl.querySelectorAll(".dot");
  frames[current].classList.remove("active");
  dots[current].classList.remove("active");
  current = (idx + frames.length) % frames.length;
  frames[current].classList.add("active");
  dots[current].classList.add("active");
}
document.getElementById("prev").addEventListener("click", () => showFrame(current - 1));
document.getElementById("next").addEventListener("click", () => showFrame(current + 1));
document.addEventListener("keydown", (e) => {
  if (document.getElementById("stage-reveal").classList.contains("hidden")) return;
  if (e.key === "ArrowLeft") showFrame(current - 1);
  if (e.key === "ArrowRight") showFrame(current + 1);
});

const stageGate = document.getElementById("stage-gate");
const stageExit = document.getElementById("stage-exit");
const stageReveal = document.getElementById("stage-reveal");
const envelope = document.getElementById("envelope");
const door = document.getElementById("door");

document.getElementById("btn-yes").addEventListener("click", () => {
  envelope.classList.add("opening");
  setTimeout(() => {
    stageGate.classList.add("hidden");
    stageReveal.classList.remove("hidden");
  }, 500);
});

document.getElementById("btn-no").addEventListener("click", () => {
  envelope.classList.add("shake");
  setTimeout(() => {
    stageGate.classList.add("hidden");
    stageExit.classList.remove("hidden");
    requestAnimationFrame(() => door.classList.add("closing"));
  }, 500);
});

document.getElementById("btn-retry").addEventListener("click", () => {
  door.classList.remove("closing");
  envelope.classList.remove("shake", "opening");
  stageExit.classList.add("hidden");
  stageGate.classList.remove("hidden");
});
</script>
</body>
</html>
